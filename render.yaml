services:
  - type: web
    name: sleeve-checker
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATA_DIR
        value: /app/data
